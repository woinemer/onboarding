var API = (function() {
  var templateApi = '<?= ScriptApp.getService().getUrl() ?>';
  if (templateApi && templateApi.indexOf('<?') === -1 && templateApi.indexOf('ScriptApp') === -1) {
    return templateApi;
  }

  var params = new URLSearchParams(window.location.search);
  var queryApi = params.get('api');
  if (queryApi) {
    try { localStorage.setItem('woinemer_onboarding_api', queryApi); } catch(e) {}
    return queryApi;
  }

  if (window.WOINEMER_ONBOARDING_API) return window.WOINEMER_ONBOARDING_API;
  try {
    var storedApi = localStorage.getItem('woinemer_onboarding_api');
    if (storedApi) return storedApi;
  } catch(e) {}

  return '';
})();
var session = null;
var currentModule = null;
var currentChapters = [];
var currentQuiz = [];
var currentFinalQuiz = null;
var userProgress = { progress: [], quizResults: [] };
var modulesCache = [];
var bereichStatusCache = [];
var isAdminUser = false;
var certificateCache = [];
var certificateSettings = { enabled: true, auto_generate: true, email_enabled: false };
var signupContext = null;
var resetToken = '';
var SESSION_STORAGE_KEY = 'woinemer_onboarding_session_v1';

function setButtonLoading(btn, label) {
  if (!btn) return function(){};
  var oldHtml = btn.innerHTML;
  var oldText = btn.textContent;
  var oldDisabled = btn.disabled;
  btn.disabled = true;
  btn.classList.add('loading');
  if (label) {
    var labelEl = btn.querySelector('.btn-label');
    if (labelEl) labelEl.textContent = label;
    else btn.innerHTML = label;
  }
  return function() {
    btn.disabled = oldDisabled;
    btn.classList.remove('loading');
    if (label) {
      var labelEl = btn.querySelector('.btn-label');
      if (labelEl) labelEl.textContent = oldText.trim() || oldHtml;
      else btn.innerHTML = oldHtml;
    }
  };
}

function initialDataCacheKey() {
  if (!session || !session.user) return '';
  return 'woinemer_onboarding_initial_' + (session.user.user_id || session.user.name || 'user');
}

function readInitialDataCache() {
  var key = initialDataCacheKey();
  if (!key) return null;
  try {
    var cached = JSON.parse(localStorage.getItem(key) || 'null');
    if (!cached || !cached.data || (Date.now() - cached.ts) > 10 * 60 * 1000) return null;
    return cached.data;
  } catch(e) {
    return null;
  }
}

function writeInitialDataCache(res) {
  var key = initialDataCacheKey();
  if (!key || !res || !res.ok) return;
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data: res })); } catch(e) {}
}

function applyInitialData(res, options) {
  options = options || {};
  isAdminUser        = res.isAdmin === true;
  modulesCache       = res.modules || [];
  bereichStatusCache = res.bereichStatus || [];
  userProgress       = { progress: res.progress || [], quizResults: res.quizResults || [] };
  lastNews           = res.news || [];
  certificateSettings = res.certificateSettings || certificateSettings;

  renderStats();
  renderNews(lastNews);
  renderModuleGrid();
  renderBereichstestSection();
  refreshCertificateButtons({ silent: options.fromCache === true });
}

// ================= LOGIN =================
function saveSession() {
  try { localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(session)); } catch(e) {}
}

function clearStoredSession() {
  try { localStorage.removeItem(SESSION_STORAGE_KEY); } catch(e) {}
}

function readStoredSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_STORAGE_KEY) || 'null'); } catch(e) { return null; }
}

function restoreSessionIfPossible() {
  var stored = readStoredSession();
  if (!stored || !stored.token) return false;
  session = stored;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('signup-screen').style.display = 'none';
  api({ action: 'validateSession', token: stored.token }, function(res) {
    if (res.ok) {
      session.user = res.user || stored.user;
      saveSession();
      loadApp();
    } else {
      session = null;
      clearStoredSession();
      showLoginScreen();
    }
  });
  return true;
}

function showLoginScreen() {
  document.getElementById('signup-screen').style.display = 'none';
  document.getElementById('auth-action-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-nav').style.display = 'none';
  hideAllScreens();
}

function showSignupScreen(area, invite) {
  signupContext = { area: area, invite: invite };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('auth-action-screen').style.display = 'none';
  document.getElementById('signup-screen').style.display = 'flex';
  document.getElementById('main-nav').style.display = 'none';
  hideAllScreens();
  var label = area === 'kueche' ? 'Küche' : 'Service';
  document.getElementById('signup-note').textContent = 'Zugang für den Bereich ' + label + ' einrichten.';
}

function doLogin() {
  var btn = document.getElementById('btn-login');
  if (btn.classList.contains('loading')) return;
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  var err = document.getElementById('login-err');
  err.style.display = 'none';
  if (!u || !p) {
    err.textContent = 'Bitte Benutzername und Passwort eingeben';
    err.style.display = 'block';
    return;
  }
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('.btn-label').textContent = 'Anmelden ...';
  api({ action: 'login', username: u, password: p }, function(res) {
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.querySelector('.btn-label').textContent = 'Anmelden';
    if (res.ok) { session = res; saveSession(); loadApp(); }
    else { err.textContent = res.error || 'Anmeldung fehlgeschlagen'; err.style.display = 'block'; }
  });
}
['login-user', 'login-pass'].forEach(function(id) {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});

  var oldToken = session && session.token;

  isAdminUser = false;
  certificateCache = [];

  document.getElementById('signup-screen').style.display = 'none';
  document.getElementById('auth-action-screen').style.display = 'none';
  hideAllScreens();
}
