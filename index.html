<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Woinemer Academy</title>
</head>
<body>
  <noscript>Bitte JavaScript aktivieren.</noscript>
  <p id="boot-status" style="font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px;color:#334155">Woinemer Academy wird geladen ...</p>
  <script>
  (async () => {
    try {
      const count = 7;
      const version = '10da2c7';
      const parts = await Promise.all(Array.from({ length: count }, (_, i) =>
        fetch('/onboarding/payload/part-' + String(i).padStart(2, '0') + '.txt?v=' + version, { cache: 'reload' }).then(r => {
          if (!r.ok) throw new Error('Payload ' + i + ' konnte nicht geladen werden: ' + r.status);
          return r.text();
        })
      ));
      const base64 = parts.join('').replace(/s+/g, '');
      if (!/^[A-Za-z0-9+/=]+$/.test(base64)) throw new Error('Payload enthaelt ungueltige Zeichen');
      const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      if (typeof DecompressionStream !== 'function') throw new Error('Browser unterstuetzt DecompressionStream nicht');
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const html = await new Response(stream).text();
      document.open();
      document.write(html);
      document.close();
    } catch (e) {
      document.body.innerHTML = '<p style="font-family:sans-serif;color:#b00020;padding:24px">Frontend konnte nicht geladen werden. Bitte Seite neu laden.</p>';
      console.error(e);
    }
  })();
  </script>
</body>
</html>
