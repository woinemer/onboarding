<!doctype html><html lang='de'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Woinemer Academy</title><style>:root{--bg:#0b0a08;--card:#1a1815;--line:#2a2621;--gold:#c9a96a;--text:#ece6d8;--muted:#b8b0a0;--green:#8bad5e;--red:#c95a4a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(900px 500px at 80% -10%,rgba(201,169,106,.1),transparent),var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}button,input{font:inherit}button{cursor:pointer}.wrap{max-width:980px;margin:auto;padding:28px 18px 70px}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.box,.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px}.box{width:min(430px,100%);padding:34px}h1,h2,h3{margin:0 0 10px;font-family:Georgia,serif;font-weight:500}.logo{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;margin:0 auto 18px;background:linear-gradient(135deg,var(--gold),#b87333);color:#111;font:32px Georgia,serif}.sub,.muted{color:var(--muted)}label{display:block;color:var(--gold);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin:16px 0 7px}input{width:100%;padding:13px;border-radius:6px;border:1px solid var(--line);background:#131210;color:var(--text)}.btn{border:1px solid var(--line);border-radius:6px;background:#131210;color:var(--text);padding:10px 14px}.primary{border:0;background:var(--gold);color:#111;font-weight:700}.danger{color:var(--red);min-height:22px;margin-top:12px}.nav{position:sticky;top:0;background:rgba(11,10,8,.84);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.brand{font:22px Georgia,serif;color:var(--gold)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.card{margin-bottom:14px}.click:hover{border-color:var(--gold)}.tag{display:inline-block;border:1px solid rgba(201,169,106,.35);color:var(--gold);border-radius:999px;padding:3px 9px;font-size:12px}.done{border-color:rgba(139,173,94,.45)}.green{color:var(--green)}.bar{height:4px;background:#2a2621;border-radius:9px;overflow:hidden;margin-top:14px}.bar span{display:block;height:100%;background:var(--gold)}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:22px 0}.stat strong{display:block;color:var(--gold);font-size:28px}.chapter{display:grid;grid-template-columns:260px 1fr;gap:14px}.list{display:grid;gap:8px;align-content:start}.list button{text-align:left}.content{line-height:1.65;color:var(--muted)}.content h1,.content h2,.content h3{color:var(--text)}.content img,.content video,.content iframe{max-width:100%;border:0;border-radius:8px}.opt{display:block;width:100%;text-align:left;margin:8px 0;padding:12px;border-radius:6px;border:1px solid var(--line);background:#131210;color:var(--text)}.sel{border-color:var(--gold);background:rgba(201,169,106,.12)}.ok{border-color:var(--green)}.bad{border-color:var(--red)}@media(max-width:720px){.chapter{grid-template-columns:1fr}.box{padding:24px}}</style></head><body><div id='root'></div><script src='./config.js'></script><script>let root=document.getElementById('root'),S=null,mods=[],areas=[],prog={progress:[],quizResults:[]},chaps=[],quiz=[],cm=null,final=null,admin=false,submitter=null,donecb=null;let params=new URLSearchParams(location.search),API=params.get('api')||window.WOINEMER_ACADEMY_API||localStorage.getItem('woinemer_academy_api')||'';if(params.get('api'))localStorage.setItem('woinemer_academy_api',API);function call(o){return new Promise(r=>{if(!API)return r({ok:false,error:'GAS-API ist noch nicht konfiguriert'});if(API.includes('script.google.com'))return jp(o,r);fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(o)}).then(x=>x.json()).then(r).catch(()=>r({ok:false,error:'Verbindungsfehler'}))})}function jp(o,r){let cb='cb'+Date.now()+Math.floor(Math.random()*1e6),s=document.createElement('script'),t=setTimeout(()=>fin({ok:false,error:'Zeitüberschreitung'}),30000);function fin(x){clearTimeout(t);delete window[cb];s.remove();r(x)}window[cb]=fin;s.onerror=()=>fin({ok:false,error:'Verbindungsfehler'});s.src=API+(API.includes('?')?'&':'?')+'api=1&callback='+encodeURIComponent(cb)+'&body='+encodeURIComponent(JSON.stringify(o));document.head.appendChild(s)}function login(){root.innerHTML=`<section class='login'><form class='box' onsubmit='auth(event)'><div class='logo'>W</div><h1>Woinemer Academy</h1><p class='sub'>Braumanufaktur · Brennerei · Restaurant</p><label>Benutzername</label><input id='u' autocomplete='username' placeholder='dein.name'><label>Passwort</label><input id='p' type='password' autocomplete='current-password' placeholder='••••••••'><p><button class='btn primary' style='width:100%'>Anmelden</button></p><div id='err' class='danger'></div></form></section>`}function auth(e){e.preventDefault();let u=val('u'),p=val('p'),err=id('err');err.textContent='';call({action:'login',username:u,password:p}).then(x=>{if(!x.ok){err.textContent=x.error||'Anmeldung fehlgeschlagen';return}S=x;home()})}function shell(body){root.innerHTML=`<nav class='nav'><div class='brand'>Woinemer Academy</div><div><a class='btn' target='_blank' rel='noopener' href='https://script.google.com/macros/s/AKfycbzDA85cieZvNmZZcY8DN3gD4CKZZ8dSenoXKnNobEZfm-S2iwD3QlO4xk44AIu9XXjq/exec'>Rezeptkartei</a> <span class='muted'>${esc(S.user.name)}</span> <button class='btn' onclick='login()'>Abmelden</button></div></nav><main class='wrap'>${body}</main>`}function home(){shell(`<p class='muted'>Lade Inhalte...</p>`);call({action:'getInitialData',token:S.token}).then(x=>{if(!x.ok)return shell(`<p class='danger'>${esc(x.error||'Fehler')}</p>`);admin=x.isAdmin===true;mods=x.modules||[];areas=x.bereichStatus||[];prog={progress:x.progress||[],quizResults:x.quizResults||[]};let dm=mods.filter(m=>m.passed).length,tc=0,dc=0;mods.forEach(m=>{tc+=num(m.total_chapters);dc+=num(m.done_chapters)});let pct=mods.length+tc?Math.round((dm+dc)/(mods.length+tc)*100):0;let news=(x.news||[]).map(n=>`<article class='card'><span class='tag'>${esc(n.bereich||'Allgemein')}</span><h3>${esc(n.title||'News')}</h3><p class='muted'>${esc(n.content||'')}</p></article>`).join('');shell(`<h1>Hallo, <span style='color:var(--gold)'>${esc((S.user.name||'').split(' ')[0])}</span></h1><p class='muted'>Deine persönliche Lernwerkstatt.</p><div class='stats'><div class='card stat'><span class='muted'>Fortschritt</span><strong>${pct}%</strong></div><div class='card stat'><span class='muted'>Module</span><strong>${dm}/${mods.length}</strong></div><div class='card stat'><span class='muted'>Kapitel</span><strong>${dc}/${tc}</strong></div></div><h2>Neuigkeiten</h2>${news||'<p class=muted>Keine News.</p>'}<h2>Deine Module</h2><div class='grid'>${mods.map((m,i)=>modCard(m,i)).join('')}</div><h2>Abschlusstests & Zertifikate</h2><div class='grid'>${areas.map((a,i)=>areaCard(a,i)).join('')}</div>`)})}function modCard(m,i){let t=num(m.total_chapters),d=num(m.done_chapters),p=t?Math.round(d/t*100):0,l=m.locked&&!admin;return `<article class='card click ${m.passed?'done':''}' ${l?'':'onclick=openMod('+i+')'}><span class='tag ${m.passed?'green':''}'>${esc(m.bereich||'Modul')}${m.passed?' · Bestanden':''}</span><h3>${esc(m.title)}</h3><p class='muted'>${esc(m.description||'')}</p>${l?`<p class='danger'>Gesperrt: ${esc(m.required_title||'Voraussetzung')}</p>`:''}<div class='bar'><span style='width:${p}%'></span></div><p class='muted'>${d}/${t} Kapitel</p></article>`}function areaCard(a,i){let l=!a.final_unlocked&&!admin;return `<article class='card ${a.final_passed?'done':''}'><span class='tag ${a.final_passed?'green':''}'>${a.final_passed?'Bestanden':l?'Gesperrt':'Bereit'}</span><h3>${esc(a.bereich)}</h3><p class='muted'>Finaler Bereichstest und Zertifikat.</p>${l?'':`<button class='btn primary' onclick='startArea(${i})'>Test starten</button>`} ${(a.certificate_ready||a.final_passed)?`<button class='btn' onclick='cert(${i})'>Zertifikat</button>`:''}</article>`}function openMod(i){cm=mods[i];shell(`<p class='muted'>Lade Kapitel...</p>`);call({action:'getChapters',token:S.token,module_id:cm.module_id}).then(x=>{if(!x.ok)return shell(`<p class='danger'>${esc(x.error||'Fehler')}</p>`);chaps=x.chapters||[];quiz=x.quiz||[];renderMod();if(chaps[0])openChap(0)})}function renderMod(){shell(`<button class='btn' onclick='home()'>Zur Übersicht</button><h1>${esc(cm.title)}</h1><p class='muted'>${esc(cm.description||'')}</p><div class='chapter'><div class='list'>${chaps.map((c,i)=>`<button class='btn' onclick='openChap(${i})'>${done(c.chapter_id)?'✓ ':''}${esc(c.title)}</button>`).join('')}${quiz.length?`<button class='btn' ${allDone()?'onclick=modQuiz()':'disabled'}>Abschlusstest Modul</button>`:''}</div><div id='body' class='card content'></div></div>`)}function openChap(i){let c=chaps[i];id('body').innerHTML=`${safe(c.content_html||'')}<p>${done(c.chapter_id)?'<button class=btn disabled>Abgeschlossen</button>':`<button class='btn primary' onclick='mark(${i})'>Kapitel abschließen</button>`}</p>`}function mark(i){let c=chaps[i];call({action:'saveProgress',token:S.token,module_id:cm.module_id,chapter_id:c.chapter_id}).then(x=>{if(!x.ok)return alert(x.error||'Fehler');prog.progress.push({chapter_id:c.chapter_id,module_id:cm.module_id});renderMod();openChap(i)})}function modQuiz(){showQuiz(cm.title,quiz,cm.quiz_min_score||70,a=>call({action:'submitQuiz',token:S.token,module_id:cm.module_id,answers:a}),x=>{if(x.passed)cm.passed=true;result(x)})}function startArea(i){let b=areas[i].bereich;call({action:'getFinalQuiz',token:S.token,bereich:b}).then(x=>{if(!x.ok)return alert(x.error||'Fehler');final={i,b,questions:x.questions||[],min:x.minScore||80};showQuiz(b,final.questions,final.min,a=>call({action:'submitFinalQuiz',token:S.token,bereich:b,answers:a}),x=>{if(x.passed){areas[i].final_passed=true;areas[i].certificate_ready=true}result(x,i)})})}function showQuiz(title,qs,min,sub,done){submitter=sub;donecb=done;shell(`<button class='btn' onclick='home()'>Zurück</button><h1>${esc(title)}</h1><p class='muted'>${qs.length} Fragen · Mindestpunktzahl ${min}%</p><div id='qs'>${qs.map((q,qi)=>`<div class='card'><h3>${esc(q.question)}</h3>${(q.options||[]).map((o,oi)=>`<button class='opt' data-q='${qi}' data-a='${oi}' onclick='pick(this)'>${String.fromCharCode(65+oi)}. ${esc(o)}</button>`).join('')}</div>`).join('')}</div><button class='btn primary' onclick='sendQuiz()'>Test auswerten</button><div id='res'></div>`)}function pick(e){e.parentNode.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));e.classList.add('sel')}function sendQuiz(){let ans={},ok=true;id('qs').querySelectorAll('.card').forEach((c,i)=>{let s=c.querySelector('.sel');if(!s)ok=false;else ans[i]=num(s.dataset.a)});if(!ok)return alert('Bitte alle Fragen beantworten');submitter(ans).then(donecb)}function result(x){(x.results||[]).forEach(r=>{let c=document.querySelector(`[data-q='${r.index}'][data-a='${r.correct_index}']`);if(c)c.classList.add('ok');let w=document.querySelector(`[data-q='${r.index}'][data-a='${r.selected_index}']`);if(w&&r.selected_index!==r.correct_index)w.classList.add('bad')});id('res').innerHTML=`<article class='card ${x.passed?'done':''}'><h2>${num(x.score)}%</h2><p>${x.passed?'Bestanden':'Nicht bestanden · Mindestpunktzahl '+x.minScore+'%'}</p><button class='btn' onclick='home()'>Zur Übersicht</button></article>`}function cert(i){let b=areas[i].bereich;call({action:'generateCertificate',token:S.token,bereich:b}).then(x=>{if(x.ok)open(x.url,'_blank');else alert(x.error||'Fehler')})}function safe(h){let t=document.createElement('template');t.innerHTML=h;t.content.querySelectorAll('script,style,iframe,object,embed').forEach(n=>n.remove());t.content.querySelectorAll('*').forEach(n=>[...n.attributes].forEach(a=>{if(a.name.startsWith('on'))n.removeAttribute(a.name)}));return t.innerHTML}function done(c){return prog.progress.some(p=>String(p.chapter_id)===String(c))}function allDone(){return admin||chaps.every(c=>done(c.chapter_id))}function id(x){return document.getElementById(x)}function val(x){return id(x).value.trim()}function num(x){return parseInt(x,10)||0}function esc(x){return String(x==null?'':x).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}login()</script></body></html>
